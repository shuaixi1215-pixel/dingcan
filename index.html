<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>云味小馆 - 在线订餐</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#menu" aria-label="云味小馆首页">
        <span class="brand-mark">云</span>
        <span>
          <strong>云味小馆</strong>
          <small>在线订餐</small>
        </span>
      </a>
      <nav class="nav">
        <a href="#menu">菜单</a>
        <a href="#checkout">下单</a>
        <a href="#orders">订单</a>
        <a href="admin.html">商家后台</a>
      </nav>
      <button class="cart-chip" type="button" data-open-cart>
        <span>购物车</span>
        <strong data-cart-count>0</strong>
      </button>
    </header>

    <main>
      <section class="hero">
        <img src="assets/hero-food.png" alt="餐桌上的套餐、面食、点心和饮品">
        <div class="hero-overlay">
          <p class="status">今日营业 10:30-21:30</p>
          <h1>热菜现做，30 分钟送达附近社区</h1>
          <p>选择喜欢的菜品，填写配送信息，就能生成订单。后台可查看订单、改状态、管理菜品上下架。</p>
          <a class="primary-link" href="#menu">开始点餐</a>
        </div>
      </section>

      <section class="summary-band" aria-label="订餐服务信息">
        <div>
          <strong>¥20</strong>
          <span>起送价</span>
        </div>
        <div>
          <strong>¥4</strong>
          <span>配送费</span>
        </div>
        <div>
          <strong>30-45</strong>
          <span>预计分钟</span>
        </div>
        <div>
          <strong>4.8</strong>
          <span>用户评分</span>
        </div>
      </section>

      <section class="layout" id="menu">
        <div class="menu-area">
          <div class="section-head">
            <div>
              <p class="eyebrow">Menu</p>
              <h2>今日菜单</h2>
            </div>
            <div class="tabs" role="tablist" aria-label="菜品分类" data-category-tabs></div>
          </div>
          <div class="dish-grid" data-menu></div>
        </div>

        <aside class="cart-panel" id="checkout" aria-label="购物车和下单">
          <div class="cart-head">
            <div>
              <p class="eyebrow">Cart</p>
              <h2>我的订单</h2>
            </div>
            <button class="ghost-button" type="button" data-clear-cart>清空</button>
          </div>
          <div class="cart-items" data-cart-items>
            <p class="empty">还没有选择菜品</p>
          </div>
          <div class="totals">
            <div><span>菜品小计</span><strong data-subtotal>¥0</strong></div>
            <div><span>配送费</span><strong data-delivery>¥0</strong></div>
            <div class="total"><span>合计</span><strong data-total>¥0</strong></div>
          </div>
          <form class="checkout-form" data-order-form>
            <label>
              姓名
              <input name="name" placeholder="例如：张先生" required>
            </label>
            <label>
              手机号
              <input name="phone" inputmode="tel" placeholder="用于接收订单通知" required>
            </label>
            <label>
              配送地址
              <textarea name="address" placeholder="小区、楼栋、门牌号" required></textarea>
            </label>
            <label>
              备注
              <input name="note" placeholder="少辣、不要香菜等">
            </label>
            <button class="submit-button" type="submit">提交订单</button>
            <p class="form-tip" data-form-tip>满 ¥20 起送，当前还未选择菜品。</p>
          </form>
        </aside>
      </section>

      <section class="orders-section" id="orders">
        <div class="section-head">
          <div>
            <p class="eyebrow">Orders</p>
            <h2>订单记录</h2>
          </div>
          <button class="ghost-button" type="button" data-clear-orders>清除记录</button>
        </div>
        <div class="orders-list" data-orders-list>
          <p class="empty">暂无订单。提交后会显示在这里。</p>
        </div>
      </section>
    </main>

    <div class="mobile-cart" hidden data-mobile-cart>
      <button type="button" data-open-cart>
        <span data-mobile-cart-text>购物车为空</span>
        <strong data-mobile-cart-total>¥0</strong>
      </button>
    </div>

    <div class="toast" role="status" aria-live="polite" data-toast></div>
    <script src="app.js"></script>
  </body>
</html>
